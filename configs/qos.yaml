# CampusNet QoS 增强模型配置
model: qos
description: "QoS 增强模型（Baseline + HTB 优先级队列）"

topology:
  bottleneck_bw: 35
  server_count: 2

modules:
  qos:
    enabled: true
    algorithm: htb
    priority_subnets:
      - 10.0.5.0/24    # 财务处
  load_balance:
    enabled: false
  security:
    enabled: true
    acl: true
    port_scan_detection: false
    flood_protection: false
    auto_ban: false
    audit_db: false

experiment:
  duration: 60
  repeat: 3
