# CampusNet 负载均衡增强模型配置
model: lb
description: "负载均衡增强模型（Baseline + Round Robin 调度）"

topology:
  bottleneck_bw: 35
  server_count: 2

modules:
  qos:
    enabled: false
  load_balance:
    enabled: true
    algorithm: round_robin
  security:
    enabled: true
    acl: true
    port_scan_detection: false
    flood_protection: false
    auto_ban: false
    audit_db: false

experiment:
  duration: 60
  repeat: 3
